<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Darae DermCase — Shared Report</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F5F4F0; --surface: #FFFFFF;
  --border: #E0DDD5; --border-strong: #C5C2B8;
  --text: #18170F; --text-2: #68655C; --text-3: #9C9990;
  --blue: #1A56A0; --blue-light: #EBF2FB; --blue-dark: #0C3D7A;
  --green: #1A6640; --green-light: #EBF5EF;
  --amber: #8A5200; --amber-light: #FBF4E8;
  --red-light: #FBEAEA; --red-dark: #7A1A1A;
  --radius: 12px; --radius-sm: 7px;
}
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem 4rem; }
.container { max-width: 700px; margin: 0 auto; }

.report-header { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 1.5rem; }
.header-icon { width: 40px; height: 40px; border-radius: 10px; background: var(--blue); display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }
.report-header h1 { font-size: 20px; font-weight: 500; letter-spacing: -0.3px; }
.report-header p { font-size: 13px; color: var(--text-2); margin-top: 4px; line-height: 1.6; }

.meta-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; margin-bottom: 1rem; display: flex; flex-wrap: wrap; gap: 10px 24px; }
.meta-item { display: flex; flex-direction: column; gap: 2px; }
.meta-label { font-size: 10.5px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-3); }
.meta-value { font-size: 14px; color: var(--text); }

.result-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 1rem; }
.result-section { padding: 1.1rem 1.25rem; }
.result-section + .result-section { border-top: 1px solid var(--border); }
.result-section-title { font-size: 10.5px; font-weight: 500; letter-spacing: 0.09em; text-transform: uppercase; color: var(--text-3); margin-bottom: 12px; }

.diff-item { background: var(--bg); border-radius: var(--radius-sm); padding: 11px 13px; margin-bottom: 9px; }
.diff-item:last-child { margin-bottom: 0; }
.diff-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 7px; }
.diff-name { font-size: 14px; font-weight: 500; }
.diff-pct { font-size: 13px; font-weight: 500; font-family: 'DM Mono', monospace; }
.diff-pct.high { color: var(--green); }
.diff-pct.mid  { color: var(--blue); }
.diff-pct.low  { color: var(--amber); }
.conf-track { height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; margin-bottom: 8px; }
.conf-fill { height: 100%; border-radius: 99px; transition: width 0.95s cubic-bezier(0.22,1,0.36,1); }
.conf-fill.high { background: #27A060; }
.conf-fill.mid  { background: var(--blue); }
.conf-fill.low  { background: #C8820A; }
.diff-reasoning { font-size: 13px; color: var(--text-2); line-height: 1.6; }

.imp-item { background: var(--bg); border-radius: var(--radius-sm); padding: 10px 12px; margin-bottom: 8px; font-size: 13.5px; line-height: 1.65; }
.imp-item:last-child { margin-bottom: 0; }
.imp-label { display: inline-block; font-size: 10.5px; font-weight: 500; padding: 2px 8px; border-radius: 99px; background: var(--blue-light); color: var(--blue-dark); margin-bottom: 5px; }

.cases-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 9px; }
.case-card { border-radius: var(--radius-sm); border: 1px solid var(--border); padding: 11px 12px; background: var(--bg); }
.case-tag { font-size: 10px; font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 5px; }
.case-tag.classic  { color: var(--green); }
.case-tag.atypical { color: var(--blue); }
.case-tag.mimic    { color: var(--amber); }
.case-name { font-size: 12.5px; font-weight: 500; color: var(--text); margin-bottom: 4px; line-height: 1.35; }
.case-desc { font-size: 11.5px; color: var(--text-2); line-height: 1.55; }

.ref-item { padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; line-height: 1.65; }
.ref-item:last-child { border-bottom: none; padding-bottom: 0; }
.ref-title { font-weight: 500; }
.ref-summary { color: var(--text-2); margin-top: 3px; }
.ref-source { font-size: 11.5px; color: var(--blue); margin-top: 4px; font-family: 'DM Mono', monospace; }

.disclaimer { font-size: 11.5px; color: var(--text-3); line-height: 1.6; padding: 10px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg); margin-top: 0.5rem; }
.error { padding: 2rem; text-align: center; color: var(--text-2); font-size: 14px; }

.back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--blue); text-decoration: none; margin-bottom: 1.5rem; }
.back-link:hover { opacity: 0.75; }

@media (max-width: 500px) { .cases-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="container">
  <a class="back-link" href="/">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Darae DermCase Assistant
  </a>
  <div id="content"><div class="error">Loading report…</div></div>
</div>
<script>
function confClass(pct) { return pct >= 65 ? 'high' : pct >= 40 ? 'mid' : 'low'; }

function render(data) {
  const { result, meta } = data;
  const diffs = result.differentials || [];
  const details = [
    { label: 'Morphology', text: result.morphology },
    { label: 'Severity',   text: result.severity },
    { label: 'Workup',     text: result.workup }
  ].filter(x => x.text);
  const cases = result.similar_cases || [];
  const refs  = result.references || [];

  const metaFields = [
    meta.age      && { label: 'Age',          value: meta.age },
    meta.sex      && { label: 'Sex',          value: meta.sex },
    meta.area     && { label: 'Affected area', value: meta.area },
    meta.duration && { label: 'Duration',     value: meta.duration },
    meta.sharedAt && { label: 'Shared',       value: new Date(meta.sharedAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) }
  ].filter(Boolean);

  const metaHtml = metaFields.length ? `
    <div class="meta-card">
      ${metaFields.map(f => `<div class="meta-item"><span class="meta-label">${f.label}</span><span class="meta-value">${f.value}</span></div>`).join('')}
    </div>` : '';

  const diffHtml = diffs.map((item, i) => {
    const pct = Math.min(100, Math.max(0, parseInt(item.confidence) || 0));
    const cls = confClass(pct);
    return `<div class="diff-item">
      <div class="diff-top"><span class="diff-name">${item.name}</span><span class="diff-pct ${cls}">${pct}%</span></div>
      <div class="conf-track"><div class="conf-fill ${cls}" style="width:${pct}%"></div></div>
      <div class="diff-reasoning">${item.reasoning}</div>
    </div>`;
  }).join('');

  const detailHtml = details.map(item =>
    `<div class="imp-item"><span class="imp-label">${item.label}</span><br>${item.text}</div>`
  ).join('');

  const casesHtml = cases.map(c =>
    `<div class="case-card">
      <div class="case-tag ${c.type}">${c.type === 'classic' ? 'Classic' : c.type === 'atypical' ? 'Atypical variant' : 'Mimicker'}</div>
      <div class="case-name">${c.title}</div>
      <div class="case-desc">${c.description}</div>
    </div>`
  ).join('');

  const refHtml = refs.map(r =>
    `<div class="ref-item">
      <div class="ref-title">${r.title}</div>
      <div class="ref-summary">${r.relevance}</div>
      <div class="ref-source">${r.source}</div>
    </div>`
  ).join('');

  document.getElementById('content').innerHTML = `
    <div class="report-header">
      <div class="header-icon">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <circle cx="10" cy="10" r="7.5" stroke="white" stroke-width="1.4"/>
          <circle cx="10" cy="10" r="2.8" fill="white" opacity="0.9"/>
          <path d="M10 2.5V4M10 16v1.5M2.5 10H4M16 10h1.5" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </div>
      <div>
        <h1>Darae DermCase Assistant</h1>
        <p>Shared case report — read only</p>
      </div>
    </div>
    ${metaHtml}
    <div class="result-card">
      <div class="result-section">
        <div class="result-section-title">Differential diagnoses</div>
        ${diffHtml}
      </div>
      ${detailHtml ? `<div class="result-section"><div class="result-section-title">Clinical details</div>${detailHtml}</div>` : ''}
      ${casesHtml ? `<div class="result-section"><div class="result-section-title">Presentation landscape</div><div class="cases-grid">${casesHtml}</div></div>` : ''}
      ${refHtml ? `<div class="result-section"><div class="result-section-title">Published literature</div>${refHtml}</div>` : ''}
    </div>
    <div class="disclaimer">For clinical review only — not a substitute for physician judgment. Shared via Darae DermCase Assistant.</div>`;
}

try {
  const hash = window.location.hash.slice(1);
  if (!hash) throw new Error('No report data in URL.');
  const data = JSON.parse(atob(hash));
  render(data);
} catch(e) {
  document.getElementById('content').innerHTML = `<div class="error">This report link is invalid or has expired.<br><br><a class="back-link" href="/">← Back to Darae DermCase</a></div>`;
}
</script>
</body>
</html>
